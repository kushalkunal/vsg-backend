version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: vsg-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: vsgdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d vsgdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  vsg-backend:
    image: kushalkunal/vsg-backend:latest
    container_name: vsg-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8090:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DATABASE_URL: jdbc:postgresql://postgres:5432/vsgdb
      DATABASE_USERNAME: postgres
      DATABASE_PASSWORD: postgres
      JWT_SECRET: 0f25b1ad54cd3a827809c1359a288cc83537011063efb02bf40cf367bacfec17
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS:-86400000}
      ALLOWED_ORIGINS: http://localhost:5173,https://www.visionarysalvagroup.com
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

volumes:
  postgres_data: