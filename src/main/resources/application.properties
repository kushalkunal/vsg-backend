spring.application.name=vsg-backend

# Supabase PgBouncer (transaction mode, port 6543)
# prepareThreshold=0 disables server-side prepared statements required by PgBouncer
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://aws-1-ap-northeast-2.pooler.supabase.com:6543/postgres?prepareThreshold=0&sslmode=require}
spring.datasource.username=${DATABASE_USERNAME:postgres.qkeftruooargdavvqrxa}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.connection-init-sql=SET statement_timeout = 30000

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
# Required for PgBouncer transaction mode — disables prepared statement caching
spring.jpa.properties.hibernate.jdbc.use_get_generated_keys=true

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
# Supabase: connect directly for migrations (avoids PgBouncer transaction-mode limits)
spring.flyway.url=${FLYWAY_URL:${spring.datasource.url}}
spring.flyway.user=${DATABASE_USERNAME:postgres.qkeftruooargdavvqrxa}
spring.flyway.password=${DATABASE_PASSWORD}

server.port=${PORT:8080}

jwt.secret=${JWT_SECRET:change-this-to-a-very-long-random-secret-key-at-least-256-bits-long}
# 24 hours
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

cors.allowed-origins=${ALLOWED_ORIGINS:http://localhost:8080,http://localhost:5173}

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never

logging.level.com.vsg=INFO
logging.level.org.springframework.security=WARN

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operations-sorter=alpha
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.try-it-out-enabled=true
springdoc.swagger-ui.display-request-duration=true
springdoc.show-actuator=false
