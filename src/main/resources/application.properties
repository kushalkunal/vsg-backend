spring.application.name=vsg-backend

# Local Docker PostgreSQL  override with env vars in production
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/vsgdb}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.connection-init-sql=SET statement_timeout = 30000

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.url=${FLYWAY_URL:${spring.datasource.url}}
spring.flyway.user=${DATABASE_USERNAME:postgres}
spring.flyway.password=${DATABASE_PASSWORD:postgres}

server.port=${PORT:8080}

jwt.secret=${JWT_SECRET:change-this-to-a-very-long-random-secret-key-at-least-256-bits-long}
# 24 hours
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

cors.allowed-origins=${ALLOWED_ORIGINS:http://localhost:8080,http://localhost:5173}

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never

logging.level.com.vsg=INFO
logging.level.org.springframework.security=WARN

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operations-sorter=alpha
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.try-it-out-enabled=true
springdoc.swagger-ui.display-request-duration=true
springdoc.show-actuator=false

# ── Google SMTP ───────────────────────────────────────────────────────────────
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# ── Frontend URL (used in password-reset emails) ──────────────────────────────
app.frontend-url=${FRONTEND_URL:https://www.visionarysalvagroup.com}

# Frontend URL used in password-reset emails
app.frontend-url=${FRONTEND_URL:https://www.visionarysalvagroup.com}
